syntax = "proto3";

option csharp_namespace = "InvestmentCalculator.Grpc";

package investment;

service InvestmentCalculatorService {
  rpc Calculate (CalculateRequest) returns (CalculateResponse);
}

message CalculateRequest {
  double initial_amount = 1;
  int32 years = 2;
  double monthly_contribution = 3;
  double annual_return_rate = 4;
}

message CalculateResponse {
  double initial_amount = 1;
  int32 years = 2;
  double monthly_contribution = 3;
  double annual_return_rate = 4;
  double end_amount = 5;
}
